<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daniel Soares | DKS Marketing</title>
  <meta name="description" content="Eu faço restaurantes baterem recordes de faturamento. Conheça o Método ROMA.">

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       RESET & TOKENS (Baseado na referência Vettor28)
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      /* Dourado DKS */
      --gold:         #d4af37;
      --gold-dark:    #b59124;
      --gold-hover:   #e8c142;
      
      --bg-dark:      #050505;
      
      --text-main:    #ffffff;
      --text-muted:   #aaaaaa;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center; 
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
      
      /* Padrão de Fundo - Restaurantes e Marketing 
         Criado com SVGs sutis dourados espalhados */
      background-image: url("data:image/svg+xml,%3Csvg width='160' height='160' viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23d4af37' stroke-width='1.5' stroke-opacity='0.15' stroke-linecap='round' stroke-linejoin='round'%3E%3C!-- Gráfico Crescimento --%3E%3Cpath d='M30 40l10-10l10 10m-10-10v20m-10 10h20'/%3E%3C!-- Cifrão --%3E%3Cpath d='M110 30c-5 0-10 2-10 5s5 5 10 5s10 2 10 5s-5 5-10 5m0-22v26'/%3E%3C!-- Loja/Restaurante --%3E%3Cpath d='M30 110l5-10h10l5 10v15H30zM35 110h10'/%3E%3C!-- Foguete --%3E%3Cpath d='M110 110l5-5a5 5 0 017 7l-5 5m-7-7l-3 10l10-3'/%3E%3C!-- Prato c/ Tampa (Cloche) --%3E%3Cpath d='M70 75a10 10 0 0120 0H70zm10-5v-2'/%3E%3C/g%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 160px 160px;
    }

    /* ============================================================
       CARD PRINCIPAL (Transparente e Focado)
    ============================================================ */
    .card {
      width: 100%;
      max-width: 420px;
      /* Fundo muito escuro e ligeiramente translúcido para o fundo aparecer bem sutil */
      background: rgba(12, 12, 12, 0.85);
      border-radius: 24px;
      padding: 48px 32px;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      
      animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fade-in-up {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       AVATAR
    ============================================================ */
    .avatar-container {
      position: relative;
      width: 100px;
      height: 100px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* O Efeito Giratório */
    .avatar-ring {
      position: absolute;
      inset: -3px; 
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent 0%, transparent 60%, var(--gold) 100%);
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* Foto de Perfil (Sem bordas duras para ser mais clean) */
    .avatar {
      position: absolute;
      inset: 2px;
      border-radius: 50%;
      background: var(--bg-dark);
      overflow: hidden;
      z-index: 2;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
    }

    /* ============================================================
       TEXTOS DA BIO
    ============================================================ */
    .name {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
      text-align: center;
      color: var(--text-main);
    }

    .handle {
      font-size: 14px;
      font-weight: 500;
      color: var(--gold);
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .tagline {
      font-size: 15px;
      font-weight: 400;
      line-height: 1.6;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 32px;
      max-width: 320px;
    }

    .tagline strong {
      color: var(--text-main);
      font-weight: 600;
    }

    /* ============================================================
       BOTÕES (Estilo exato da referência Vettor28)
    ============================================================ */
    .buttons-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 32px;
    }

    .btn {
      width: 100%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center; /* Texto sempre centralizado */
      padding: 20px 24px; /* Mais alto */
      border-radius: 999px; /* Formato Pílula perfeito como na ref */
      font-size: 15.5px;
      font-weight: 600; /* Letras Brancas e encorpadas */
      color: #ffffff;
      text-decoration: none;
      transition: all 0.2s ease;
      
      /* Entrada animada */
      opacity: 0;
      animation: slide-up 0.4s ease-out forwards;
    }

    @keyframes slide-up {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    
    .btn:nth-child(1) { animation-delay: 0.1s; }
    .btn:nth-child(2) { animation-delay: 0.15s; }
    .btn:nth-child(3) { animation-delay: 0.2s; }
    .btn:nth-child(4) { animation-delay: 0.25s; }

    /* Ícone outline clean na esquerda */
    .btn-icon {
      position: absolute;
      left: 24px;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: currentColor;
    }

    .btn-icon svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Botão Principal */
    .btn-primary {
      background: var(--gold-dark); /* Fundo sólido dourado escuro/marrom */
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-primary:hover {
      background: var(--gold); /* Brilha levemente no hover */
      transform: translateY(-2px);
    }

    /* Botões Secundários */
    .btn-secondary {
      background: rgba(255, 255, 255, 0.05); /* Escuro translúcido */
      border: 1px solid rgba(255, 255, 255, 0.15); /* Borda fina */
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    /* ============================================================
       RODAPÉ
    ============================================================ */
    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
    }
    
    .footer a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 700;
      transition: color 0.2s;
    }

    .footer a:hover {
      color: var(--gold-hover);
    }

    .instagram-icon {
      width: 16px;
      height: 16px;
      color: var(--gold);
    }
  </style>
</head>
<body>

  <div class="card">
    
    <!-- Avatar / Efeito Giratório -->
    <div class="avatar-container">
      <div class="avatar-ring"></div>
      <div class="avatar">
        <img src="/daniel-soares.jpg" alt="Daniel Soares">
      </div>
    </div>

    <!-- Identificação -->
    <h1 class="name">Daniel Soares</h1>

    <!-- Tagline (Incluindo a frase do Método Roma aqui para ficar mais clean) -->
    <p class="tagline">
      Faço <strong>restaurantes e deliveries</strong> baterem recordes de faturamento. Conheça o Método ROMA.

    <div class="buttons-group">

      <a href="https://dksmarketing.com.br/metodologia" class="btn btn-secondary" target="_blank">

      <a href="https://dksmarketing.com.br" class="btn btn-secondary" target="_blank">
        <div class="btn-icon">
          <!-- Ícone Globo Outline -->
          <svg viewBox="0 0 24 24">

          </svg>

    </div>

    <!-- Rodapé Estilo Vettor28 -->
    <div class="footer">
      <strong>DKS.</strong> Marketing para restaurantes 
      <a href="https://www.instagram.com/dksmarketing/" target="_blank">
        <svg class="instagram-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </a>
    </div>
  </div>

</body>
</html>
