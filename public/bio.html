<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daniel Soares | DKS Marketing</title>
  <meta name="description" content="Eu faço restaurantes baterem recordes de faturamento. Conheça o Método ROMA.">

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       RESET & TOKENS (ULTRA PREMIUM DARK/GOLD)
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      /* Dourado Luxo */
      --gold:         #d4af37;
      --gold-light:   #ebd285;
      --gold-dark:    #9c7f21;
      --gold-glow:    rgba(212, 175, 55, 0.15);
      
      --bg-dark:      #0a0a0a;
      
      --text-main:    #ffffff;
      --text-muted:   #a0a0a0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center; 
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* ORBS NO FUNDO PARA O EFEITO GLASS FUNCIONAR DE VERDADE */
    .bg-orb-1 {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, rgba(0,0,0,0) 70%);
      z-index: -1;
      pointer-events: none;
    }

    .bg-orb-2 {
      position: fixed;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 300px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, rgba(0,0,0,0) 70%);
      z-index: -1;
      pointer-events: none;
    }

    /* ============================================================
       CARD PRINCIPAL (Glassmorphism Limpo)
    ============================================================ */
    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(20, 20, 20, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 32px;
      padding: 48px 32px;
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fade-in-up {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       AVATAR PREMIUM + LOOPING GIRATÓRIO
    ============================================================ */
    .avatar-container {
      position: relative;
      width: 110px;
      height: 110px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Anel brilhante em looping */
    .avatar-ring {
      position: absolute;
      inset: -3px; 
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent 0%, transparent 60%, var(--gold) 100%);
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* Avatar da Foto */
    .avatar {
      position: absolute;
      inset: 2px;
      border-radius: 50%;
      background: var(--bg-dark);
      border: 2px solid #111;
      overflow: hidden;
      z-index: 2;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
    }

    /* Ponto Online Dourado */
    .status-dot {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 14px;
      height: 14px;
      background-color: var(--gold);
      border-radius: 50%;
      border: 2px solid #111;
      z-index: 3;
    }

    /* ============================================================
       TEXTOS DA BIO
    ============================================================ */
    .name {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
      text-align: center;
      color: var(--text-main);
    }

    .handle {
      font-size: 14px;
      font-weight: 500;
      color: var(--gold);
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* Badge Método ROMA */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .badge-dot {
      width: 5px;
      height: 5px;
      background-color: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--gold-glow);
    }

    .tagline {
      font-size: 15px;
      font-weight: 400;
      line-height: 1.6;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 32px;
      max-width: 300px;
    }

    .tagline strong {
      color: var(--text-main);
      font-weight: 600;
    }

    /* ============================================================
       BOTÕES GLASSMORPHISM (CLEAN E MODERNOS)
    ============================================================ */
    .buttons-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 32px;
    }

    .btn {
      width: 100%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 20px;
      border-radius: 16px; /* Mais clean, menos "salsicha" */
      font-size: 15px;
      font-weight: 500; /* Letra branca e elegante */
      color: #ffffff; /* Letras Brancas exigidas */
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      
      /* Efeito Glassmorphism base */
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      
      /* Entrada animada */
      opacity: 0;
      animation: slide-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes slide-up {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    
    .btn:nth-child(1) { animation-delay: 0.1s; }
    .btn:nth-child(2) { animation-delay: 0.15s; }
    .btn:nth-child(3) { animation-delay: 0.2s; }
    .btn:nth-child(4) { animation-delay: 0.25s; }

    /* Ícone fixo na esquerda de forma clean */
    .btn-icon {
      position: absolute;
      left: 20px;
      font-size: 18px;
      transition: transform 0.3s ease;
    }

    .btn:hover .btn-icon {
      transform: scale(1.1);
    }

    /* ==================================
       Botão Principal (Destaque Dourado Suave)
       ================================== */
    .btn-primary {
      background: rgba(255, 255, 255, 0.08); 
      border: 1px solid rgba(212, 175, 55, 0.4); /* Borda dourada chamativa */
      box-shadow: 
        inset 0 1px 0 rgba(255, 255, 255, 0.1),
        0 4px 20px rgba(212, 175, 55, 0.15); /* Glow dourado ao redor */
    }

    .btn-primary:hover {
      background: rgba(212, 175, 55, 0.15); /* Fica mais dourado no hover */
      border-color: rgba(212, 175, 55, 0.6);
      transform: translateY(-2px);
      box-shadow: 
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        0 8px 24px rgba(212, 175, 55, 0.25);
    }

    /* ==================================
       Botões Secundários (Glass Puro e Clean)
       ================================== */
    .btn-secondary {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
      box-shadow: 
        inset 0 1px 0 rgba(255, 255, 255, 0.1),
        0 8px 20px rgba(0, 0, 0, 0.3);
    }

    /* ============================================================
       REDES SOCIAIS E RODAPÉ
    ============================================================ */
    .social-links {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }

    .social-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: all 0.3s ease;
    }

    .social-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-3px);
    }

    .footer {
      font-size: 11px;
      font-weight: 400;
      color: #555;
    }
    
    .footer a {
      color: #777;
      text-decoration: none;
      transition: color 0.2s;
    }
    
    .footer a:hover {
      color: var(--gold);
    }
  </style>
</head>
<body>

</body>
</html>
