<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daniel Soares | DKS Marketing</title>
  <meta name="description" content="Eu faço restaurantes baterem recordes de faturamento. Conheça o Método ROMA.">

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       RESET & TOKENS (ULTRA PREMIUM DARK/GOLD)
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      /* Dourado Luxo */
      --gold:         #d4af37;
      --gold-light:   #ebd285;
      --gold-dark:    #9c7f21;
      --gold-glow:    rgba(212, 175, 55, 0.25);
      
      --bg-dark:      #050505;
      --card-bg:      rgba(15, 15, 15, 0.5);
      --card-border:  rgba(212, 175, 55, 0.15);
      
      --text-main:    #ffffff;
      --text-muted:   #999999;
    }

    body {
      font-family: 'Helvetica', 'Arial', sans-serif;
      background-color: #050505;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      overflow-x: hidden;
      position: relative;
    }

    /* ============================================================
       AMBIENT ORBS (FUNDO ANIMADO PREMIUM E SUTIL)
    ============================================================ */
    .ambient-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px); /* Mais blur para ficar super difuso */
      z-index: 0;
      opacity: 0.25; /* Bem mais sutil e elegante */
      pointer-events: none;
      animation: float-orb 15s infinite alternate ease-in-out;
    }

    .orb-1 {
      width: 55vw;
      height: 55vw;
      background: #c1561f; /* Cobre/Mostarda */
      top: -10%;
      left: -10%;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 65vw;
      height: 65vw;
      background: #d4af37; /* Dourado escuro */
      bottom: -20%;
      right: -10%;
      animation-delay: -5s;
      animation-duration: 20s;
    }

    .orb-3 {
      width: 45vw;
      height: 45vw;
      background: #8a6c1c; /* Dourado bem profundo */
      top: 25%;
      left: 40%;
      animation-delay: -10s;
      animation-duration: 24s;
    }

    @keyframes float-orb {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(5vw, -5vh) scale(1.1); }
      66% { transform: translate(-3vw, 3vh) scale(0.9); }
      100% { transform: translate(0, 0) scale(1); }
    }

    /* ============================================================
       CARD PRINCIPAL (Glassmorphism de Alto Padrão - Mais Transparente)
    ============================================================ */
    .card {
      width: 100%;
      max-width: 380px; 
      background: rgba(12, 12, 12, 0.4); /* Mais transparente */
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 32px;
      padding: 32px 24px; 
      backdrop-filter: blur(12px); /* Menos blur para ver o fundo */
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 
        0 40px 80px rgba(0, 0, 0, 0.5), /* Sombra mais suave */
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 10; 
      
      animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fade-in-up {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       AVATAR PREMIUM + LOOPING GIRATÓRIO (Menor)
    ============================================================ */
    .avatar-container {
      position: relative;
      width: 90px;
      height: 90px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-ring {
      position: absolute;
      inset: -2px; 
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent 0%, transparent 50%, var(--gold) 100%);
      animation: spin 2.5s linear infinite;
      box-shadow: 0 0 15px var(--gold-glow);
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .avatar {
      position: absolute;
      inset: 2px;
      border-radius: 50%;
      background: var(--bg-dark);
      border: 2px solid #000;
      overflow: hidden;
      z-index: 2;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
    }

    /* ============================================================
       TEXTOS DA BIO (Menores)
    ============================================================ */
    .name-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 2px;
      text-align: center;
      color: var(--text-main);
    }

    .username {
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: -6px; /* Margem negativa para grudar completamente no badge */
      text-align: center;
      letter-spacing: 0.5px;
      line-height: 1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      background: rgba(212, 175, 55, 0.12);
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 100px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .badge-dot {
      width: 5px;
      height: 5px;
      background-color: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--gold-glow);
    }

    .description {
      font-size: 13.5px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 28px;
      max-width: 280px;
    }

    .description strong {
      color: var(--text-main);
      font-weight: 800;
      font-size: 14px;
    }

    /* ============================================================
       BOTÕES GLASSMORPHISM CENTRALIZADOS (Mais compactos verticalmente)
    ============================================================ */
    .buttons-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 16px;
    }

    .btn {
      width: 100%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center; 
      padding: 15px 10px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 800; 
      letter-spacing: 0.5px;
      text-decoration: none;
      text-transform: uppercase;
      transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); 
      overflow: hidden; /* Necessário para o reflexo ficar dentro do botão */
      
      opacity: 0;
      animation: drop-down 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Efeito de Reflexo (Shine) */
    .btn::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
      transform: skewX(-25deg);
      animation: shine 12s infinite; /* Muito mais lento e elegante */
      pointer-events: none;
    }

    @keyframes drop-down {
      0% { opacity: 0; transform: translateY(-20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes shine {
      0% { left: -100%; }
      20% { left: 200%; }
      100% { left: 200%; }
    }
    
    /* Cascata de entrada */
    .btn:nth-child(1) { animation-delay: 0.1s; }
    .btn:nth-child(2) { animation-delay: 0.2s; }
    .btn:nth-child(3) { animation-delay: 0.3s; }
    .btn:nth-child(4) { animation-delay: 0.4s; }

    /* Cascata do reflexo (mais espaçada para acompanhar a lerdeza) */
    .btn:nth-child(1)::after { animation-delay: 0s; }
    .btn:nth-child(2)::after { animation-delay: 2s; }
    .btn:nth-child(3)::after { animation-delay: 4s; }
    .btn:nth-child(4)::after { animation-delay: 6s; }

    .btn-icon {
      position: absolute;
      left: 18px;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease;
    }

    .btn:hover .btn-icon {
      transform: scale(1.1) rotate(-5deg);
    }

    .btn-text {
      text-align: center;
      padding: 0 40px;
      width: 100%;
      line-height: 1.3;
    }

    .btn-primary {
      background: linear-gradient(135deg, #e8c340 0%, #c1561f 100%); 
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 24px rgba(193, 86, 31, 0.4);
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(193, 86, 31, 0.6);
      border-color: rgba(255,255,255,0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(232, 195, 64, 0.4);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    /* ============================================================
       RODAPÉ MINIMALISTA
    ============================================================ */
    .footer-banner {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 12px;
      text-decoration: none;
      transition: all 0.3s ease;
      opacity: 0.5;
    }

    .footer-banner:hover {
      opacity: 1;
      transform: translateY(-1px);
    }

    .footer-text {
      font-size: 9px;
      font-weight: 400;
      color: var(--text-muted);
      text-align: center;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .footer-text strong {
      color: var(--gold);
      font-weight: 800;
    }
  </style>
</head>
<body>
  <!-- Efeito Aurora / Orbs -->
  <div class="ambient-orb orb-1"></div>
  <div class="ambient-orb orb-2"></div>
  <div class="ambient-orb orb-3"></div>

  <!-- Centralizador Principal -->
  <div class="card">
    
    <!-- Avatar / Efeito Giratório -->
    <div class="avatar-container">
      <div class="avatar-ring"></div>
      <div class="avatar">
        <img src="/daniel-soares.jpg" alt="Daniel Soares">

    <!-- Identidade -->
    <div class="name-title">Daniel Soares</div>

    <!-- Mini-Bio -->
    <p class="description">

    </p>

    <!-- Botões Glass Centralizados -->
    <div class="buttons-group">

      <a href="https://app.leadster.com.br/capture/GgOLgXHkEDtqvhx7" class="btn btn-secondary" target="_blank">

      <a href="https://dksmarketing.com.br/metodologia" class="btn btn-secondary" target="_blank">
        <span class="btn-icon">🎯</span>
        <span class="btn-text">Conhecer o Método ROMA</span>
      </a>

      <a href="https://dksmarketing.com.br" class="btn btn-secondary" target="_blank">
        <span class="btn-icon">🌐</span>
        <span class="btn-text">Nosso Site Oficial</span>
      </a>
    </div>

    <!-- Rodapé Minimalista -->
    <a href="https://www.instagram.com/agenciadks.restaurante/" class="footer-banner" target="_blank" rel="noopener">
      <div class="footer-text">Desenvolvido por <strong>Agência DKS</strong></div>
    </a>
  </div>

</body>
</html>
