<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daniel Soares | DKS Marketing</title>
  <meta name="description" content="Eu faço restaurantes baterem recordes de faturamento. Conheça o Método ROMA.">

  <!-- Google Fonts: Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       RESET & TOKENS (ULTRA PREMIUM DARK/GOLD)
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      /* Dourado Luxo */
      --gold:         #d4af37;
      --gold-light:   #ebd285;
      --gold-dark:    #9c7f21;
      --gold-glow:    rgba(212, 175, 55, 0.25);
      
      --bg-dark:      #050505;
      --card-bg:      rgba(15, 15, 15, 0.5);
      --card-border:  rgba(212, 175, 55, 0.15);
      
      --text-main:    #ffffff;
      --text-muted:   #999999;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center; /* Centralizado verticalmente */
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
      /* Background elegante com glow dourado no topo */
      background-image: 
        radial-gradient(circle at 50% -10%, rgba(212, 175, 55, 0.15) 0%, transparent 60%),
        radial-gradient(circle at 50% 110%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
    }

    /* Padrão de grid muito sutil no fundo */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 30px 30px;
      opacity: 0.5;
    }

    /* ============================================================
       CARD PRINCIPAL (Glassmorphism de Alto Padrão)
    ============================================================ */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 32px;
      padding: 48px 32px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 
        0 30px 60px rgba(0, 0, 0, 0.7),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      
      animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fade-in-up {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       AVATAR PREMIUM + LOOPING GIRATÓRIO
    ============================================================ */
    .avatar-container {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Anel brilhante em looping */
    .avatar-ring {
      position: absolute;
      inset: -2px; /* Espessura do anel */
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent 0%, transparent 50%, var(--gold) 100%);
      animation: spin 2.5s linear infinite;
      box-shadow: 0 0 15px var(--gold-glow);
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* Avatar da Foto */
    .avatar {
      position: absolute;
      inset: 2px;
      border-radius: 50%;
      background: var(--bg-dark);
      border: 2px solid #000;
      overflow: hidden;
      z-index: 2;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
    }

    /* Ponto Online Dourado */
    .status-dot {
      position: absolute;
      bottom: 6px;
      right: 6px;
      width: 16px;
      height: 16px;
      background-color: var(--gold);
      border-radius: 50%;
      border: 3px solid var(--bg-dark);
      z-index: 3;
      box-shadow: 0 0 10px var(--gold-glow);
    }

    /* ============================================================
       TEXTOS DA BIO
    ============================================================ */
    .name {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 2px;
      text-align: center;
      color: var(--text-main);
    }

    .handle {
      font-size: 14px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 18px;
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* Badge Método ROMA */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      background: rgba(212, 175, 55, 0.12);
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      background-color: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--gold-glow);
    }

    .tagline {
      font-size: 15px;
      font-weight: 400;
      line-height: 1.6;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 32px;
      max-width: 300px;
    }

    .tagline strong {
      color: var(--text-main);
      font-weight: 800;
      font-size: 15.5px;
    }


    /* ============================================================
       BOTÕES ELEGANTES
    ============================================================ */
    .buttons-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 32px;
    }

    .btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-radius: 24px; /* Mais moderno e arredondado */
      font-size: 14.5px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      
      /* Entrada animada */
      opacity: 0;
      animation: slide-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes slide-up {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    
    .btn:nth-child(1) { animation-delay: 0.1s; }
    .btn:nth-child(2) { animation-delay: 0.2s; }
    .btn:nth-child(3) { animation-delay: 0.3s; }
    .btn:nth-child(4) { animation-delay: 0.4s; }

    .btn-content {
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 2;
    }

    /* Container do ícone super moderno */
    .btn-icon {
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      transition: transform 0.3s ease;
    }

    .btn:hover .btn-icon {
      transform: scale(1.1);
    }

    .btn-arrow {
      opacity: 0.3;
      transition: transform 0.3s ease, opacity 0.3s ease;
      z-index: 2;
      font-size: 16px;
    }

    .btn:hover .btn-arrow {
      transform: translateX(4px);
      opacity: 1;
    }

    /* ==================================
       Botão Principal (Dourado Moderno)
       ================================== */
    .btn-primary {
      background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
      color: #111;
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 
        inset 0 1px 1px rgba(255, 255, 255, 0.7),
        0 10px 24px rgba(212, 175, 55, 0.35);
    }

    .btn-primary .btn-icon {
      background: rgba(0, 0, 0, 0.1);
      box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 
        inset 0 1px 1px rgba(255, 255, 255, 0.8),
        0 14px 32px rgba(212, 175, 55, 0.45);
    }

    .btn-primary .btn-arrow {
      color: #000;
      opacity: 0.6;
    }

    /* ==================================
       Botões Secundários (Dark Glass/Neumorphic)
       ================================== */
    .btn-secondary {
      background: linear-gradient(180deg, rgba(35, 35, 35, 0.85) 0%, rgba(15, 15, 15, 0.95) 100%);
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 
        inset 0 1px 1px rgba(255, 255, 255, 0.05),
        0 6px 16px rgba(0, 0, 0, 0.4);
    }

    .btn-secondary .btn-icon {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.02);
    }

    .btn-secondary:hover {
      background: linear-gradient(180deg, rgba(45, 45, 45, 0.9) 0%, rgba(20, 20, 20, 0.95) 100%);
      border-color: rgba(212, 175, 55, 0.4);
      transform: translateY(-2px) scale(1.01);
      box-shadow: 
        inset 0 1px 1px rgba(255, 255, 255, 0.1),
        0 10px 24px rgba(212, 175, 55, 0.15);
    }

    .btn-secondary .btn-arrow {
      color: var(--gold);
    }

    /* ============================================================
       REDES SOCIAIS E RODAPÉ
    ============================================================ */
    .social-links {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }

    .social-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: all 0.3s ease;
    }

    .social-btn:hover {
      background: var(--gold);
      color: #000;
      border-color: var(--gold);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px var(--gold-glow);
    }

    .footer {
      font-size: 11px;
      font-weight: 400;
      color: #555;
    }
    
    .footer a {
      color: #777;
      text-decoration: none;
      transition: color 0.2s;
    }
    
    .footer a:hover {
      color: var(--gold);
    }
  </style>
</head>
