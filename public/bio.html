<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daniel Soares | DKS Marketing</title>
  <meta name="description" content="Eu faço restaurantes baterem recordes de faturamento. Conheça o Método ROMA.">

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       RESET & TOKENS (ULTRA PREMIUM DARK/GOLD)
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      /* Dourado Luxo */
      --gold:         #d4af37;
      --gold-light:   #ebd285;
      --gold-dark:    #9c7f21;
      --gold-glow:    rgba(212, 175, 55, 0.25);
      
      --bg-dark:      #050505;
      --card-bg:      rgba(15, 15, 15, 0.5);
      --card-border:  rgba(212, 175, 55, 0.15);
      
      --text-main:    #ffffff;
      --text-muted:   #999999;
    }

    body {
      font-family: 'Helvetica', 'Arial', sans-serif;
      background-color: #050505;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      overflow-x: hidden;
      position: relative;
    }

    /* Fundo Temático (Ícones DKS) */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23d4af37' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round' opacity='0.25'%3E%3Cpath d='M22 18c3-3 9-3 9-3s0 6-3 9l-9 9l-6-6l9-9z M16 24l-6 3l3-6 M25 33l3 6l-6-3 M13 36l-4 4' /%3E%3Cpath d='M65 35c0-10 6-16 12-16s12 6 12 16H65z M77 19v-4 M62 35h30' /%3E%3Cpath d='M15 85v-10M22 85v-18M29 85v-24M10 85h25 M12 75l6-6l6 5l8-10' /%3E%3Cpath d='M65 72l10-5v20l-10-5v-10z M75 67c4 0 6 4 6 10s-2 10-6 10 M65 82l-2 5h-5l2-5' /%3E%3C/g%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 120px 120px;
      pointer-events: none;
    }

    /* ============================================================
       AMBIENT ORBS (FUNDO ANIMADO PREMIUM)
    ============================================================ */
    .ambient-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
      opacity: 0.35;
      pointer-events: none;
      animation: float-orb 15s infinite alternate ease-in-out;
    }

    .orb-1 {
      width: 50vw;
      height: 50vw;
      background: #c1561f;
      top: -10%;
      left: -10%;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 60vw;
      height: 60vw;
      background: #d4af37;
      bottom: -20%;
      right: -10%;
      animation-delay: -5s;
      animation-duration: 22s;
    }

    .orb-3 {
      width: 40vw;
      height: 40vw;
      background: #e8c340;
      top: 30%;
      left: 50%;
      animation-delay: -10s;
      animation-duration: 26s;
    }

    @keyframes float-orb {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(5vw, -5vh) scale(1.1); }
      66% { transform: translate(-3vw, 3vh) scale(0.9); }
      100% { transform: translate(0, 0) scale(1); }
    }

    /* ============================================================
       CARD PRINCIPAL (Glassmorphism de Alto Padrão - Mais Compacto)
    ============================================================ */
    .card {
      width: 100%;
      max-width: 380px;
      background: rgba(12, 12, 12, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 32px;
      padding: 32px 24px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 
        0 40px 80px rgba(0, 0, 0, 0.9),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 10;
      
      animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fade-in-up {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       AVATAR PREMIUM + LOOPING GIRATÓRIO (Menor)
    ============================================================ */
    .avatar-container {
      position: relative;
      width: 90px;
      height: 90px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-ring {
      position: absolute;
      inset: -2px; 
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent 0%, transparent 50%, var(--gold) 100%);
      animation: spin 2.5s linear infinite;
      box-shadow: 0 0 15px var(--gold-glow);
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .avatar {
      position: absolute;
      inset: 2px;
      border-radius: 50%;
      background: var(--bg-dark);
      border: 2px solid #000;
      overflow: hidden;
      z-index: 2;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
    }

    /* ============================================================
       TEXTOS DA BIO (Menores)
    ============================================================ */
    .name-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 2px;
      text-align: center;
      color: var(--text-main);
    }

    .username {
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 14px;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      background: rgba(212, 175, 55, 0.12);
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 100px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .badge-dot {
      width: 5px;
      height: 5px;
      background-color: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--gold-glow);
    }

    .description {
      font-size: 13.5px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 28px;
      max-width: 280px;
    }

    .description strong {
      color: var(--text-main);
      font-weight: 800;
      font-size: 14px;
    }

    /* ============================================================
       BOTÕES GLASSMORPHISM CENTRALIZADOS (Mais compactos verticalmente)
    ============================================================ */
    .buttons-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 16px;
    }

    .btn {
      width: 100%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center; 
      padding: 15px 10px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 800; 
      letter-spacing: 0.5px;
      text-decoration: none;
      text-transform: uppercase;
      transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); 
      
      opacity: 0;
      animation: 
        slide-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards,
        float-button 4s ease-in-out infinite;
    }

    @keyframes slide-up {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes float-button {
      0% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
      100% { transform: translateY(0); }
    }
    
    .btn:nth-child(1) { animation-delay: 0.1s, 0.1s; }
    .btn:nth-child(2) { animation-delay: 0.2s, 1s; }
    .btn:nth-child(3) { animation-delay: 0.3s, 2s; }
    .btn:nth-child(4) { animation-delay: 0.4s, 3s; }

    .btn-icon {
      position: absolute;
      left: 18px;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease;
    }

    .btn:hover .btn-icon {
      transform: scale(1.1) rotate(-5deg);
    }

    .btn-text {
      text-align: center;
      padding: 0 40px;
      width: 100%;
      line-height: 1.3;
    }

    .btn-primary {
      background: linear-gradient(135deg, #e8c340 0%, #c1561f 100%); 
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 24px rgba(193, 86, 31, 0.4);
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(193, 86, 31, 0.6);
      border-color: rgba(255,255,255,0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(232, 195, 64, 0.4);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    /* ============================================================
       RODAPÉ BANNER
    ============================================================ */
    .footer-banner {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 100px;
      padding: 6px 14px;
      margin-top: 4px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }

    .footer-banner:hover {
      transform: translateY(-2px);
      border-color: rgba(212, 175, 55, 0.4);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 24px rgba(212, 175, 55, 0.15);
    }

    .footer-text {
      font-size: 7px;
      font-weight: 500;
      color: #aaa;
      text-align: center;
      padding: 0 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <!-- Efeito Aurora / Orbs -->
  <div class="ambient-orb orb-1"></div>
  <div class="ambient-orb orb-2"></div>
  <div class="ambient-orb orb-3"></div>

  <!-- Centralizador Principal -->

    <p class="description">

      <a href="https://dksmarketing.com.br" class="btn btn-secondary" target="_blank">

      </a>
    </div>

    <!-- Rodapé Estilo Banner (Vettor28) -->

      <div class="footer-text">Desenvolvido por Agência DKS marketing para restaurantes</div>
    </a>
  </div>

</body>
</html>
