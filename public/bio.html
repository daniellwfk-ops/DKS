<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daniel Soares | DKS Marketing</title>
  <meta name="description" content="Eu faço restaurantes baterem recordes de faturamento. Conheça o Método ROMA.">

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       RESET & TOKENS (ULTRA PREMIUM DARK/GOLD)
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      /* Dourado Luxo */
      --gold:         #d4af37;
      --gold-light:   #ebd285;
      --gold-dark:    #9c7f21;
      --gold-glow:    rgba(212, 175, 55, 0.25);
      
      --bg-dark:      #050505;
      --card-bg:      rgba(15, 15, 15, 0.5);
      --card-border:  rgba(212, 175, 55, 0.15);
      
      --text-main:    #ffffff;
      --text-muted:   #999999;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center; 
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
      /* Padrão de Fundo - Ladrilhos Estilo DKS */
      background-image: url("data:image/svg+xml,%3Csvg width='90' height='90' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='0' y='0' width='40' height='40' fill='%23090909' /%3E%3Crect x='40' y='0' width='40' height='40' fill='%23120f04' /%3E%3Crect x='0' y='40' width='40' height='40' fill='%23120f04' /%3E%3Crect x='40' y='40' width='40' height='40' fill='%23090909' /%3E%3Cg fill='none' stroke='%23d4af37' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round' opacity='0.35'%3E%3C!-- Foguete --%3E%3Cpath d='M22 12c2-2 6-2 6-2s0 4-2 6l-6 6l-4-4l6-6z M18 16l-4 2l2-4 M24 22l2 4l-4-2 M16 24l-3 3' /%3E%3C!-- Grafico --%3E%3Cpath d='M50 28v-8M56 28v-14M62 28v-18M46 28h22 M48 20l5-5l5 4l6-8' /%3E%3C!-- Cloche (Restaurante) --%3E%3Cpath d='M10 65c0-8 5-13 10-13s10 5 10 13H10z M20 52v-3 M8 65h24' /%3E%3C!-- Megafone (Marketing) --%3E%3Cpath d='M52 56l8-4v16l-8-4v-8z M60 52c3 0 5 3 5 8s-2 8-5 8 M52 64l-2 4h-4l2-4' /%3E%3C/g%3E%3C/svg%3E");
      background-repeat: repeat;
    }

    /* ============================================================
       CARD PRINCIPAL (Glassmorphism de Alto Padrão)
    ============================================================ */
    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(12, 12, 12, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 32px;
      padding: 48px 32px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 
        0 40px 80px rgba(0, 0, 0, 0.9),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      
      animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fade-in-up {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       AVATAR PREMIUM + LOOPING GIRATÓRIO
    ============================================================ */
    .avatar-container {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Anel brilhante em looping */
    .avatar-ring {
      position: absolute;
      inset: -2px; 
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent 0%, transparent 50%, var(--gold) 100%);
      animation: spin 2.5s linear infinite;
      box-shadow: 0 0 15px var(--gold-glow);
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* Avatar da Foto */
    .avatar {
      position: absolute;
      inset: 2px;
      border-radius: 50%;
      background: var(--bg-dark);
      border: 2px solid #000;
      overflow: hidden;
      z-index: 2;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
    }

    /* ============================================================
       TEXTOS DA BIO
    ============================================================ */
    .name {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 2px;
      text-align: center;
      color: var(--text-main);
    }

    .handle {
      font-size: 14px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 18px;
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* Badge Método ROMA */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      background: rgba(212, 175, 55, 0.12);
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      background-color: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--gold-glow);
    }

    .tagline {
      font-size: 15px;
      font-weight: 400;
      line-height: 1.6;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 32px;
      max-width: 300px;
    }

    .tagline strong {
      color: var(--text-main);
      font-weight: 800;
      font-size: 15.5px;
    }

    /* ============================================================
       BOTÕES GLASSMORPHISM CENTRALIZADOS
    ============================================================ */
    .buttons-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 16px; /* Mais perto do rodapé */
    }

    .btn {
      width: 100%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center; 
      padding: 18px 20px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.2px;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      
      opacity: 0;
      animation: slide-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes slide-up {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    
    .btn:nth-child(1) { animation-delay: 0.1s; }
    .btn:nth-child(2) { animation-delay: 0.2s; }
    .btn:nth-child(3) { animation-delay: 0.3s; }
    .btn:nth-child(4) { animation-delay: 0.4s; }

    /* Ícone fixo na esquerda */
    .btn-icon {
      position: absolute;
      left: 18px;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease;
    }

    .btn:hover .btn-icon {
      transform: scale(1.1) rotate(-5deg);
    }

    .btn-text {
      text-align: center;
    }

    /* Botão Principal */
    .btn-primary {
      background: rgba(212, 175, 55, 0.85); 
      color: #000;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 
        inset 0 1px 1px rgba(255, 255, 255, 0.5),
        0 8px 32px rgba(212, 175, 55, 0.3);
    }

    .btn-primary:hover {
      background: rgba(212, 175, 55, 0.95);
      transform: translateY(-2px);
      box-shadow: 
        inset 0 1px 1px rgba(255, 255, 255, 0.7),
        0 12px 36px rgba(212, 175, 55, 0.4);
    }

    /* Botões Secundários */
    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        0 4px 16px rgba(0, 0, 0, 0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(212, 175, 55, 0.3);
      transform: translateY(-2px);
      box-shadow: 
        inset 0 1px 0 rgba(255, 255, 255, 0.1),
        0 8px 24px rgba(212, 175, 55, 0.15);
    }

    /* ============================================================
       RODAPÉ BANNER
    ============================================================ */
    .footer-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 100px;
      padding: 8px 14px; /* Mais fino */
      margin-top: 4px; /* Mais perto do ultimo botao */
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }

    .footer-banner:hover {
      transform: translateY(-2px);
      border-color: rgba(212, 175, 55, 0.4);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 24px rgba(212, 175, 55, 0.15);
    }

    .footer-logo {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .footer-logo img {
      height: 26px; /* Um pouco menor */
      width: auto;
      display: block;
    }

    .footer-text {
      font-size: 9px; /* Ainda menor, conforme solicitado */
      font-weight: 500;
      color: #aaa;
      flex-grow: 1;
      text-align: center;
      padding: 0 8px;
      letter-spacing: 0.4px;
      text-transform: uppercase; /* Dará mais legibilidade em tamanho pequeno */
    }

    .footer-ig {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px; 
      height: 24px;
      border-radius: 6px;
      background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="card">
    
    <!-- Avatar / Efeito Giratório -->

  </div>

</body>
